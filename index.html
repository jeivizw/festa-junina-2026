<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arraiá 2026 • Gestão de Festa Junina</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🎪</div>
                <h1 class="logo-text">Arraiá<span>2026</span></h1>
                <p class="logo-subtitle">Gestão de Festa Junina</p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-tab="comidas">
                    <span class="nav-emoji">🌽</span>
                    <div class="nav-info">
                        <span class="nav-title">Comidas Típicas</span>
                        <span class="nav-desc">Cardápio da festa</span>
                    </div>
                    <span class="nav-badge" id="count-comidas">0</span>
                </button>

                <button class="nav-btn" data-tab="brincadeiras">
                    <span class="nav-emoji">🎯</span>
                    <div class="nav-info">
                        <span class="nav-title">Brincadeiras</span>
                        <span class="nav-desc">Jogos e diversão</span>
                    </div>
                    <span class="nav-badge" id="count-brincadeiras">0</span>
                </button>

                <button class="nav-btn" data-tab="participantes">
                    <span class="nav-emoji">👥</span>
                    <div class="nav-info">
                        <span class="nav-title">Participantes</span>
                        <span class="nav-desc">Convidados</span>
                    </div>
                    <span class="nav-badge" id="count-participantes">0</span>
                </button>

                <button class="nav-btn" data-tab="barracas">
                    <span class="nav-emoji">🏪</span>
                    <div class="nav-info">
                        <span class="nav-title">Barracas</span>
                        <span class="nav-desc">Estandes</span>
                    </div>
                    <span class="nav-badge" id="count-barracas">0</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="connection-indicator" id="connection-indicator">
                    <div class="indicator-dot"></div>
                    <span>Verificando conexão...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="breadcrumb">
                    <span class="breadcrumb-icon">🌾</span>
                    <span class="breadcrumb-text" id="current-section">Comidas Típicas</span>
                </div>
                
                <button class="add-button" onclick="abrirModal()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Novo Item
                </button>
            </header>

            <!-- Content Area -->
            <section class="content-area">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🎊</div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-items">0</span>
                            <span class="stat-label">Total de Itens</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <span class="stat-value" id="valor-total">R$ 0,00</span>
                            <span class="stat-label">Valor Total Estimado</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <span class="stat-value" id="categorias-count">0</span>
                            <span class="stat-label">Categorias</span>
                        </div>
                    </div>
                </div>

                <!-- Items Grid -->
                <div class="items-grid" id="items-container">
                    <!-- Empty State -->
                    <div class="empty-state" id="empty-state">
                        <div class="empty-illustration">🎈</div>
                        <h3>Nenhum item encontrado</h3>
                        <p>Comece adicionando seu primeiro item clicando no botão "Novo Item"</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-backdrop" onclick="fecharModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Adicionar Item</h2>
                <button class="modal-close" onclick="fecharModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M6 6L18 18M6 18L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic form content -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
